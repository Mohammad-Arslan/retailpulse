[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
; Ensure workers never fall back to bind-mounted .env 127.0.0.1 hosts
environment=DB_HOST="mysql",DB_PORT="3306",REDIS_HOST="redis",REDIS_PORT="6379",MAIL_HOST="mailpit",MAIL_PORT="1025"

[program:serve]
command=php artisan serve --host=0.0.0.0 --port=8000 --no-reload
directory=/var/www/html
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=10

[program:vite]
command=npm run dev -- --host 0.0.0.0 --port 5173
directory=/var/www/html
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=10
environment=CHOKIDAR_USEPOLLING="true",VITE_USE_POLLING="true",VITE_PORT="5173"

[program:reverb]
command=php artisan reverb:start --host=0.0.0.0 --port=8080
directory=/var/www/html
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=10

[program:queue]
; queue:listen reloads workers on code change (unlike queue:work)
command=php artisan queue:listen --tries=3 --timeout=0
directory=/var/www/html
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=60

[program:schedule]
command=php artisan schedule:work
directory=/var/www/html
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=10
