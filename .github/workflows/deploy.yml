name: Deploy to Staging

# Runs after CI finishes on main -- deploy never happens on an unvalidated
# commit. First activation of a workflow_run trigger requires this file to
# already be merged to the default branch once (a GitHub quirk, not a bug
# here) -- see docs/deployment-guidelines.md for the manual fallback.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to staging VPS
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/retailpulse
            git pull origin main
            bash setup.sh production --rebuild
            # Do NOT add explicit migrate/db:seed/cache commands here.
            # docker/entrypoint.sh already runs the *entire* production
            # bootstrap itself on every container (re)start -- wait for
            # mysql/redis, migrate, seed, then config:cache/route:cache/
            # view:cache/event:cache -- before starting supervisord. And
            # `docker compose up -d` (inside setup.sh) returns as soon as
            # the container *starts*, not once entrypoint.sh's sequence
            # finishes, so any exec'd command here fires concurrently
            # with entrypoint.sh's own identical steps inside the same
            # container. That race caused two real failures on 2026-07-23:
            # a duplicate-key error on role_has_permissions (db:seed run
            # twice), then a SIGKILL/137 (config:cache racing entrypoint's
            # own config:cache). entrypoint.sh alone is sufficient.
